version: '3.8'

services:
  nginx:
    image: nginx:1:25
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

  backend:
    image: backend-app:latest
    depends_on:
      - db
    networks:
      - app_network

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network

  backup:
    image: backup-service:latest
    depends_on:
      - db
    volumes:
      - db_data:/data
      - backup_data:/backup
    networks:
      - app_network

volumes:
  db_data:
  backup_data:

networks:
  app_network:
